services:
  server:
    build: .
    restart: unless-stopped
    volumes:
      - ./db:/app/db
    environment:
      TZ: Asia/Tokyo

  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest-amd64
    environment:
      - OAUTH2_PROXY_HTTP_ADDRESS=0.0.0.0:4180
      - OAUTH2_PROXY_UPSTREAMS=http://server:3000/
      - OAUTH2_PROXY_PROVIDER=oidc
      - OAUTH2_PROXY_PROVIDER_DISPLAY_NAME=Koken OIDC
      - OAUTH2_PROXY_CLIENT_ID
      - OAUTH2_PROXY_CLIENT_SECRET
      - OAUTH2_PROXY_REDIRECT_URL
      - OAUTH2_PROXY_SKIP_OIDC_DISCOVERY=true
      - OAUTH2_PROXY_OIDC_ISSUER_URL
      - OAUTH2_PROXY_OIDC_JWKS_URL
      - OAUTH2_PROXY_LOGIN_URL
      - OAUTH2_PROXY_REDEEM_URL
      - OAUTH2_PROXY_EMAIL_DOMAINS=*
      - OAUTH2_PROXY_COOKIE_SECRET
      - OAUTH2_PROXY_PASS_AUTHORIZATION_HEADER=true
      - OAUTH2_PROXY_SKIP_PROVIDER_BUTTON=true
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared
    restart: unless-stopped
    command:
      - tunnel
      - --no-autoupdate
      - run
    environment:
      - TUNNEL_TOKEN
